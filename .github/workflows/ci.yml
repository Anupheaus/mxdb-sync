name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  setup:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Remove local file overrides
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.pnpm;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
      - run: pnpm install --no-frozen-lockfile
      - name: Archive workspace
        run: tar -czf /tmp/workspace.tar.gz --exclude='.git' .
      - uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: /tmp/workspace.tar.gz
          retention-days: 1

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - run: tar -xzf workspace.tar.gz
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm test --run

  test-crud:
    name: CRUD E2E Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - run: tar -xzf workspace.tar.gz
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm test:crud

  test-performance:
    name: Performance E2E Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - run: tar -xzf workspace.tar.gz
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm test:performance

  test-stress:
    name: Stress Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - run: tar -xzf workspace.tar.gz
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm test:stress
